remote_theme: giellalt/jekyll-theme-giellalt
title: Inari Sámi Text-to-Speech
description: Speech technology resources for the Inari Sámi language
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jemoji

defaults:
  - scope: { path: "" }
    values:
      layout: default

markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    disable: true
